<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма отправки</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        input, textarea { display: block; margin-bottom: 10px; width: 350px; padding: 8px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        #status { margin-top: 20px; padding: 15px; border: 1px solid #ddd; display: none; }
    </style>
    
    <link rel="icon" href="data:,">
</head>
<body>
    <h2>Отправка данных на сервер</h2>
    
    <input type="text" id="userName" placeholder="Ваше имя">
    <input type="email" id="userEmail" placeholder="Ваш Email">
    <button id="submitBtn">Отправить на сервер</button>

    <div id="status"></div>

    <script>
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            const statusDiv = document.getElementById('status');
                      const params = new URLSearchParams();
            params.append('name', name);
            params.append('email', email);

            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });

                const result = await response.text(); // Сервер возвращает HTML строку
                
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = result; 
                
                if (response.status !== 200) {
                    statusDiv.style.borderColor = 'red';
                } else {
                    statusDiv.style.borderColor = '#28a745';
                }
            } catch (error) {
                statusDiv.style.display = 'block';
                statusDiv.innerText = 'Ошибка при отправке: ' + error.message;
            }
        });
    </script>
</body>
</html>
